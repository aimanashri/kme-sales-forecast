version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kme_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - kme_network

  scheduler:                     
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kme_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose; sleep 60; done"
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      - app
    networks:
      - kme_network

  web:
    image: nginx:stable-alpine
    container_name: kme_nginx
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kme_network

networks:
  kme_network:
    driver: bridge
    name: kme_network
